name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        # Delete node_modules and package-lock.json to start fresh
        rm -rf node_modules package-lock.json
        # Install dependencies
        npm install --legacy-peer-deps

    - name: Build application
      run: |
        # Set environment variables for build
        export NODE_ENV=production
        # Try building with Next.js
        npm run build || {
          echo "Build failed, trying alternative approach..."
          # Clear Next.js cache
          rm -rf .next
          # Try building again without Turbo
          npx next build
        }
      env:
        NODE_ENV: production
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_ANALYZE_API_KEY: ${{ secrets.GEMINI_ANALYZE_API_KEY }}
        UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USERNAME }}
        key: ${{ secrets.DO_SSH_KEY }}
        port: 22
        script: |
          # Navigate to app directory
          cd /var/www/resumy
          
          # Pull latest changes
          git pull origin main
          
          # Install dependencies
          npm install --production
          
          # Build the application
          npm run build
          
          # Restart PM2 process
          pm2 restart resumy || pm2 start ecosystem.config.js --name resumy
          
          # Save PM2 configuration
          pm2 save
