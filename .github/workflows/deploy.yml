name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  # Remove pull_request trigger - only deploy on push to main
  workflow_dispatch: # Allow manual deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Security: Only deploy from main branch
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v3
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build application
      run: pnpm run build
      env:
        NODE_ENV: production
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    - name: Create deployment package
      run: |
        # Create a clean deployment package with only necessary files
        mkdir -p deploy-package
        
        # Copy built files
        cp -r .next deploy-package/
        cp -r public deploy-package/
        cp -r node_modules deploy-package/ 2>/dev/null || echo "Skipping node_modules copy"
        
        # Copy config files
        cp package.json deploy-package/
        cp pnpm-lock.yaml deploy-package/
        cp next.config.ts deploy-package/ 2>/dev/null || cp next.config.js deploy-package/ 2>/dev/null || true
        cp ecosystem.config.js deploy-package/ 2>/dev/null || true
        
        # Create a tarball
        tar -czf deploy.tar.gz -C deploy-package .

    - name: Transfer deployment package to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USERNAME }}
        key: ${{ secrets.DO_SSH_KEY }}
        port: ${{ secrets.DO_SSH_PORT || 22 }}
        source: "deploy.tar.gz"
        target: "/tmp/"

    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USERNAME }}
        key: ${{ secrets.DO_SSH_KEY }}
        port: ${{ secrets.DO_SSH_PORT || 22 }}
        script_stop: true # Stop on first error
        script: |
          set -e # Exit on any error
          
          # Define colors for output
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m' # No Color
          
          echo -e "${GREEN}Starting deployment...${NC}"
          
          # Navigate to app directory
          cd /var/www/resumy
          
          # Backup current deployment
          if [ -d ".next" ]; then
            echo -e "${YELLOW}Backing up current deployment...${NC}"
            tar -czf ../resumy-backup-$(date +%Y%m%d-%H%M%S).tar.gz .next public node_modules 2>/dev/null || true
          fi
          
          # Extract new deployment
          echo -e "${GREEN}Extracting new deployment...${NC}"
          tar -xzf /tmp/deploy.tar.gz -C /var/www/resumy/
          rm /tmp/deploy.tar.gz
          
          # Install/update dependencies if needed
          if [ ! -d "node_modules" ] || [ pnpm-lock.yaml -nt node_modules ]; then
            echo -e "${GREEN}Installing dependencies...${NC}"
            pnpm install --frozen-lockfile --prod
          fi
          
          # Create secure .env.local file using printf to avoid heredoc issues
          echo -e "${GREEN}Creating environment configuration...${NC}"
          printf "NODE_ENV=production\nNEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}\nNEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}\nSUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}\nGEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}\nUPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}\nUPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}\nNEXT_PUBLIC_SITE_URL=https://resumy.live\n" > .env.local
          
          # Secure permissions
          chmod 600 .env.local
          
          # Create ecosystem.config.js with correct next.js path
          echo -e "${GREEN}Creating PM2 config...${NC}"
          printf "module.exports = {\n  apps: [{\n    name: 'resumy',\n    script: 'node_modules/next/dist/bin/next',\n    args: 'start',\n    cwd: '/var/www/resumy',\n    instances: 1,\n    exec_mode: 'fork',\n    autorestart: true,\n    watch: false,\n    max_memory_restart: '1G',\n    env: {\n      NODE_ENV: 'production',\n      PORT: 3000\n    }\n  }]\n};\n" > ecosystem.config.js
          
          # Restart PM2 process (ensure it works regardless of current state)
          echo -e "${GREEN}Restarting application...${NC}"
          if pm2 describe resumy > /dev/null 2>&1; then
            echo "App exists, restarting..."
            pm2 restart resumy --update-env
          else
            echo "App not found, starting fresh..."
            pm2 start ecosystem.config.js
          fi
          
          # Wait for the application to start
          sleep 5
          
          # Check if the application is running
          pm2 list
          
          # Health check
          echo -e "${GREEN}Running health check...${NC}"
          for i in {1..10}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo -e "${GREEN}✓ Application is healthy${NC}"
              break
            fi
            echo "Waiting for application to start... ($i/10)"
            sleep 2
          done
          
          # Save PM2 configuration
          pm2 save
          
          # Cleanup old backups (keep last 5)
          cd /var/www
          ls -t resumy-backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm
          
          echo -e "${GREEN}✓ Deployment completed successfully!${NC}"
