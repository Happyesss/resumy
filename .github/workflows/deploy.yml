name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        # Delete node_modules and package-lock.json to start fresh
        rm -rf node_modules package-lock.json
        # Install dependencies
        npm install --legacy-peer-deps --omit=dev

    - name: Build application
      run: |
        # Set environment variables for build
        export NODE_ENV=production
        # Try building with Next.js
        npm run build || {
          echo "Build failed, trying alternative approach..."
          # Clear Next.js cache
          rm -rf .next
          # Try building again without Turbo
          npx next build
        }
      env:
        NODE_ENV: production
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_ANALYZE_API_KEY: ${{ secrets.GEMINI_ANALYZE_API_KEY }}
        UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    - name: Transfer files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USERNAME }}
        key: ${{ secrets.DO_SSH_KEY }}
        port: 22
        source: "."
        target: "/var/www/resumy"
        rm: true

    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DO_HOST }}
        username: ${{ secrets.DO_USERNAME }}
        key: ${{ secrets.DO_SSH_KEY }}
        port: 22
        script: |
          # Check if Node.js is installed, if not run initial setup
          if ! command -v node &> /dev/null; then
            echo "Node.js not found. Running initial server setup..."
            
            # Update system
            apt update && apt upgrade -y
            
            # Install Node.js 20
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
            
            # Install PM2 globally
            npm install -g pm2
            
            # Install Nginx
            apt install -y nginx
            
            echo "Initial setup completed!"
          fi
          
          # Ensure PM2 is installed globally
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi
          
          # Create app directory
          mkdir -p /var/www/resumy
          
          # Navigate to app directory
          cd /var/www/resumy
          
          # Create .env file with production environment variables
          cat > .env.local << EOF
          NODE_ENV=production
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_ANALYZE_API_KEY=${{ secrets.GEMINI_ANALYZE_API_KEY }}
          UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          NEXT_PUBLIC_SITE_URL=https://resumy.live
          EOF
          
          # Ensure proper permissions
          chmod 600 .env.local
          
          # Install dependencies
          npm install --legacy-peer-deps --production
          
          # Build the application
          npm run build
          
          # Create PM2 ecosystem config if it doesn't exist
          if [ ! -f ecosystem.config.js ]; then
            cat > ecosystem.config.js << EOF
          module.exports = {
            apps: [{
              name: 'resumy',
              script: 'npm',
              args: 'start',
              cwd: '/var/www/resumy',
              env: {
                NODE_ENV: 'production',
                PORT: 3000
              }
            }]
          };
          EOF
          fi
          
          # Restart PM2 process
          pm2 restart resumy || pm2 start ecosystem.config.js --name resumy
          
          # Save PM2 configuration
          pm2 save
          
          # Setup PM2 to start on boot
          pm2 startup
          
          # Configure Nginx for domain
          cat > /etc/nginx/sites-available/resumy.live << 'NGINX_EOF'
          server {
              listen 80;
              server_name resumy.live www.resumy.live;
              
              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          NGINX_EOF
          
          # Enable the site
          ln -sf /etc/nginx/sites-available/resumy.live /etc/nginx/sites-enabled/
          
          # Remove default Nginx site
          rm -f /etc/nginx/sites-enabled/default
          
          # Test Nginx configuration
          nginx -t
          
          # Restart Nginx
          systemctl restart nginx
          systemctl enable nginx
          
          echo "Deployment completed successfully!"
